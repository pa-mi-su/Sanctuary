name: Liturgical Validation

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - uat

jobs:
  validate-liturgical-calendar:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate liturgical calendar rules
        env:
          SWIFT_MODULE_CACHE_PATH: /tmp/swift-module-cache
          CLANG_MODULE_CACHE_PATH: /tmp/clang-module-cache
        run: |
          chmod +x scripts/validate_liturgical_calendar.swift
          ./scripts/validate_liturgical_calendar.swift
